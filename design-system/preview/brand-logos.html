<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);font-family:'Inter', sans-serif;}
  .wrap{padding:22px 24px;display:flex;gap:20px;align-items:stretch;flex-wrap:wrap;}
  .panel{display:flex;flex-direction:column;align-items:flex-start;gap:8px;}
  .swatch{
    display:inline-flex;
    align-items:center;
    padding:14px 18px;
    border:1px solid var(--border-1);
    background:var(--bg0);
    border-radius:3px;
    box-sizing:border-box;
  }
  .swatch.dark{background:#1A1A1A;border-color:#1A1A1A;}
  .cap{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color:var(--fg2);
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  /* Inline lockup — uses JetBrains Mono, matches login header treatment:
     font-mono font-bold tracking-widest uppercase + font-light sub */
  .lockup{
    display:inline-flex;
    align-items:baseline;
    gap:6px;
    font-family:'JetBrains Mono', 'SF Mono', Menlo, monospace;
    line-height:1;
  }
  .lockup__mark{
    font-weight:700;
    font-size:18px;
    letter-spacing:0.18em;
    text-transform:uppercase;
  }
  .lockup__sub{
    font-weight:300;
    font-size:9px;
    letter-spacing:0.12em;
    text-transform:uppercase;
  }
  .light .lockup__mark{color:#1A1A1A;}
  .light .lockup__sub{color:#6B6B6B;}
  .dark  .lockup__mark{color:#FAFAFA;}
  .dark  .lockup__sub{color:#A8A8A8;}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="swatch light">
      <span class="lockup">
        <span class="lockup__mark">LATENT</span><span class="lockup__sub">RESEARCH</span>
      </span>
    </div>
    <div class="cap">Primary lockup</div>
  </div>

  <div class="panel">
    <div class="swatch light">
      <span class="lockup">
        <span class="lockup__mark">LATENT</span>
      </span>
    </div>
    <div class="cap">Short mark</div>
  </div>

  <div class="panel">
    <div class="swatch dark">
      <span class="lockup">
        <span class="lockup__mark">LATENT</span><span class="lockup__sub">RESEARCH</span>
      </span>
    </div>
    <div class="cap">Inverse on dark</div>
  </div>
</div>
</body>
</html>
