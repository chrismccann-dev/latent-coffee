<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:16px;}
  .ex{font-family:var(--font-mono);}
  .spec{font-family:var(--font-mono);font-size:10px;color:var(--fg2);min-width:170px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><div class="spec">Mono 700 / 18 / .15em</div><div class="ex" style="font-size:18px;font-weight:700;letter-spacing:.15em;">LATENT RESEARCH</div></div>
  <div class="row"><div class="spec">Mono 600 / 11.5 / .1em</div><div class="ex" style="font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;">BREWS · TERROIRS · CULTIVARS</div></div>
  <div class="row"><div class="spec">Mono 600 / 10.4 / .1em</div><div class="ex" style="font-size:10.4px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fg2);">COFFEE DETAILS</div></div>
  <div class="row"><div class="spec">Mono 400 / 11.5</div><div class="ex" style="font-size:11.5px;color:var(--fg2);">55 coffees</div></div>
  <div class="row"><div class="spec">Mono 400 / 10.4</div><div class="ex" style="font-size:10.4px;">Ethiopia · Sidama · Bensa</div></div>
</div>
</body>
</html>
