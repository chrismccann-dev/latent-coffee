<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  /* Matches components/StrategyPill.tsx `row` variant:
     px-1.5 py-0.5 rounded border text-[9px] */
  .pill{
    display:inline-flex;
    align-items:center;
    padding:2px 6px;
    border-radius:4px;
    font-family:var(--font-mono);
    font-size:9px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    border:1px solid;
    white-space:nowrap;
  }
  .cap{
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--fg2);
    text-transform:uppercase;
    letter-spacing:.08em;
    width:100%;
    margin-top:6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="pill" style="background:#E8F0EA;color:#2D5E3A;border-color:#4A7C59;">Clarity-First</div>
  <div class="pill" style="background:#F5E8D0;color:#6B4A10;border-color:#8B6914;">Balanced Intensity</div>
  <div class="pill" style="background:#F0DCE1;color:#722F4B;border-color:#8B3B4B;">Full Expression</div>
  <div class="cap">Row variant — bordered, 4px radius (matches <code>StrategyPill</code>)</div>

  <span class="strategy-pill strategy-pill--clarity">CLARITY</span>
  <span class="strategy-pill strategy-pill--balanced">BALANCED</span>
  <span class="strategy-pill strategy-pill--full">FULL</span>
  <div class="cap">Card variant — borderless, fully rounded 8px abbreviation</div>
</div>
</body>
</html>
