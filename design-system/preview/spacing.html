<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:22px 24px;display:flex;align-items:flex-end;gap:18px;}
  .cell{display:flex;flex-direction:column;align-items:flex-start;gap:6px;}
  .box{background:#E8F0EA;border:1px solid #4A7C59;}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--fg2);text-transform:uppercase;letter-spacing:.08em;}
</style>
</head>
<body>
<div class="wrap">
  <div class="cell"><div class="box" style="width:4px;height:4px;"></div><div class="cap">1 · 4px</div></div>
  <div class="cell"><div class="box" style="width:8px;height:8px;"></div><div class="cap">2 · 8px</div></div>
  <div class="cell"><div class="box" style="width:12px;height:12px;"></div><div class="cap">3 · 12px</div></div>
  <div class="cell"><div class="box" style="width:16px;height:16px;"></div><div class="cap">4 · 16px</div></div>
  <div class="cell"><div class="box" style="width:24px;height:24px;"></div><div class="cap">6 · 24px</div></div>
  <div class="cell"><div class="box" style="width:32px;height:32px;"></div><div class="cap">8 · 32px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px;"></div><div class="cap">12 · 48px</div></div>
</div>
</body>
</html>
