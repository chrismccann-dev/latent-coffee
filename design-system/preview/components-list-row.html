<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:16px 24px;}
  .row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border-1);}
  .sw{width:40px;height:40px;border-radius:4px;flex-shrink:0;}
  .name{font-family:var(--font-sans);font-size:14px;font-weight:600;flex:1;}
  .count{font-family:var(--font-mono);font-size:11.5px;color:var(--fg2);}
  .arrow{font-family:var(--font-mono);font-size:12px;color:var(--fg2);opacity:.4;}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><div class="sw" style="background:#4A7C59;"></div><div class="name">Volcán Barú Highlands</div><div class="count">7 coffees</div><div class="arrow">→</div></div>
  <div class="row"><div class="sw" style="background:#6B7B3B;"></div><div class="name">Guji Highlands</div><div class="count">5 coffees</div><div class="arrow">→</div></div>
  <div class="row" style="border-bottom:none;"><div class="sw" style="background:#7A3B4B;"></div><div class="name">Huila Highlands</div><div class="count">4 coffees</div><div class="arrow">→</div></div>
</div>
</body>
</html>
