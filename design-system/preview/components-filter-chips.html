<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:22px 24px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg2);text-transform:uppercase;letter-spacing:.1em;margin-right:6px;}
  .chip{font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:6px 12px;border-radius:4px;border:1px solid;}
</style>
</head>
<body>
<div class="wrap">
  <span class="lbl">Strategy</span>
  <span class="chip" style="background:#1A1A1A;color:#fff;border-color:#1A1A1A;">All</span>
  <span class="chip" style="background:#E8F0EA;color:#2D5E3A;border-color:#4A7C59;">Clarity-First</span>
  <span class="chip" style="background:#F5E8D0;color:#6B4A10;border-color:#8B6914;">Balanced Intensity</span>
  <span class="chip" style="background:#F0DCE1;color:#722F4B;border-color:#8B3B4B;">Full Expression</span>
</div>
</body>
</html>
