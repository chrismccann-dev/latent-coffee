<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:22px 24px;}
  table{width:100%;font-family:var(--font-mono);font-size:11.5px;border-collapse:collapse;}
  th{text-align:left;padding:8px;font-weight:500;color:var(--fg2);border-bottom:1px solid var(--border-1);text-transform:uppercase;letter-spacing:.06em;font-size:10px;}
  td{padding:8px;border-bottom:1px solid var(--border-1);}
  tr.highlight{background:#F8FFF0;}
</style>
</head>
<body>
<div class="wrap">
  <table>
    <thead><tr><th>Batch</th><th>Drop °C</th><th>DTR</th><th>Total</th><th>Score</th></tr></thead>
    <tbody>
      <tr><td>#23</td><td>202.1</td><td>1:42</td><td>9:20</td><td>82.5</td></tr>
      <tr class="highlight"><td>#25</td><td>201.4</td><td>1:50</td><td>9:34</td><td>86.0</td></tr>
      <tr><td>#26</td><td>200.8</td><td>1:55</td><td>9:41</td><td>84.0</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
