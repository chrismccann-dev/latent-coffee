<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Latent — Brand Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; padding:0; background: var(--bg1); }
  .card { padding: 28px 24px; display:flex; flex-direction:column; gap:16px; }
  .row { display:flex; align-items:center; gap:20px; }
  .dark { background: var(--latent-fg); padding: 18px 20px; border-radius: 6px; display:inline-flex; align-items:center; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg2); text-transform: uppercase; letter-spacing: .12em; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <span class="brand">LATENT<span class="brand__sub">RESEARCH</span></span>
    </div>
    <div class="row">
      <div class="dark"><span class="brand" style="color:#FAFAFA">LATENT<span class="brand__sub" style="color:#888">RESEARCH</span></span></div>
      <span class="brand">LATENT</span>
    </div>
    <div class="meta">Mono · Bold 700 + Light 300 · tracking-widest 0.15em</div>
  </div>
</body>
</html>
