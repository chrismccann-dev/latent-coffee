<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:20px 24px;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .sw{display:flex;flex-direction:column;gap:4px;align-items:flex-start;}
  .chip{width:40px;height:40px;border-radius:4px;}
  .name{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg1);}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#4A3728"></div><div class="name">Brazil</div></div>
    <div class="sw"><div class="chip" style="background:#3D3D3D"></div><div class="name">China</div></div>
    <div class="sw"><div class="chip" style="background:#7A3B4B"></div><div class="name">Colombia</div></div>
    <div class="sw"><div class="chip" style="background:#2D5E3A"></div><div class="name">Costa Rica</div></div>
    <div class="sw"><div class="chip" style="background:#4A6B3B"></div><div class="name">Ecuador</div></div>
    <div class="sw"><div class="chip" style="background:#6B7B3B"></div><div class="name">Ethiopia</div></div>
    <div class="sw"><div class="chip" style="background:#3B5B6B"></div><div class="name">Guatemala</div></div>
    <div class="sw"><div class="chip" style="background:#4A7C59"></div><div class="name">Panama</div></div>
    <div class="sw"><div class="chip" style="background:#5B4A6B"></div><div class="name">Peru</div></div>
    <div class="sw"><div class="chip" style="background:#6B4A3B"></div><div class="name">Burundi</div></div>
    <div class="sw"><div class="chip" style="background:#8B3B2B"></div><div class="name">Kenya</div></div>
    <div class="sw"><div class="chip" style="background:#7B3B4B"></div><div class="name">Rwanda</div></div>
  </div>
</div>
</body>
</html>
