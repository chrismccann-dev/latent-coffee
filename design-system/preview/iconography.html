<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:22px 24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;font-family:var(--font-mono);font-size:13px;}
  .item{display:flex;align-items:center;gap:10px;}
  .glyph{font-size:20px;line-height:1;color:var(--fg1);}
  .cap{font-size:10px;color:var(--fg2);text-transform:uppercase;letter-spacing:.08em;}
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><span class="glyph">+</span><span class="cap">ADD button</span></div>
  <div class="item"><span class="glyph">←</span><span class="cap">Back link</span></div>
  <div class="item"><span class="glyph">→</span><span class="cap">Hover reveal</span></div>
  <div class="item"><span class="glyph">·</span><span class="cap">Meta separator</span></div>
  <div class="item"><span class="glyph">🌍</span><span class="cap">TERROIR</span></div>
  <div class="item"><span class="glyph">🧬</span><span class="cap">CULTIVAR</span></div>
  <div class="item"><span class="glyph">☕</span><span class="cap">Empty brews</span></div>
  <div class="item"><span class="glyph">🌱</span><span class="cap">Empty green</span></div>
</div>
</body>
</html>
