<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{border-bottom:1px solid var(--border-1);}
  .header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border-1);}
  nav{display:flex;gap:32px;}
  .link{font-family:var(--font-mono);font-size:11.5px;font-weight:500;letter-spacing:.1em;color:var(--fg2);text-transform:uppercase;text-decoration:none;}
  .link.active{color:var(--fg1);font-weight:600;}
  .brand{font-family:var(--font-mono);font-weight:700;font-size:17px;letter-spacing:.15em;text-transform:uppercase;}
  .sub{font-family:var(--font-mono);font-weight:300;font-size:11px;letter-spacing:.1em;color:var(--fg2);margin-left:6px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div><span class="brand">LATENT<span class="sub">RESEARCH</span></span></div>
    <nav>
      <a class="link active" href="#">BREWS</a>
      <a class="link" href="#">TERROIRS</a>
      <a class="link" href="#">CULTIVARS</a>
      <a class="link" href="#">GREEN</a>
    </nav>
    <button class="btn btn-primary" style="padding:8px 14px;">+ ADD</button>
  </div>
</div>
</body>
</html>
