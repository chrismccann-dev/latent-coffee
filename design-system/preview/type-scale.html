<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:baseline;gap:14px;font-family:var(--font-mono);}
  .spec{font-size:10px;color:var(--fg2);min-width:170px;}
  .val{font-size:10.4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><div class="spec">--text-xxs · 10.4px</div><div class="val" style="font-size:10.4px;">LABEL · 10.4 · MONO 600 · UPPER</div></div>
  <div class="row"><div class="spec">--text-xs · 11.5px</div><div class="val" style="font-size:11.5px;">BUTTON · 11.5 · MONO 600 · UPPER</div></div>
  <div class="row"><div class="spec">--text-sm · 14px</div><div class="val" style="font-size:14px;font-family:var(--font-sans);">Body — Inter 400 · 14 · 1.5</div></div>
  <div class="row"><div class="spec">--text-lg · 18px</div><div class="val" style="font-size:18px;font-family:var(--font-sans);font-weight:600;">Subhead — Inter 600 · 18</div></div>
  <div class="row"><div class="spec">--text-2xl · 24px</div><div class="val" style="font-size:24px;font-family:var(--font-sans);font-weight:600;">Title — Inter 600 · 24</div></div>
</div>
</body>
</html>
