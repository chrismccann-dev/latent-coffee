<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg1);}
  .wrap{padding:22px 24px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{aspect-ratio:3/4;border-radius:4px;}
  .name{font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fg1);}
  .sub{font-family:var(--font-mono);font-size:9px;color:var(--fg2);}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--fg2);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:#4A7C59"></div><div class="name">Gesha × Washed</div><div class="hex">#4A7C59</div></div>
      <div class="sw"><div class="chip" style="background:#5B7A6B"></div><div class="name">Gesha Other</div><div class="hex">#5B7A6B</div></div>
      <div class="sw"><div class="chip" style="background:#8B4513"></div><div class="name">Natural</div><div class="hex">#8B4513</div></div>
      <div class="sw"><div class="chip" style="background:#8B6914"></div><div class="name">Honey</div><div class="hex">#8B6914</div></div>
      <div class="sw"><div class="chip" style="background:#722F4B"></div><div class="name">Anaerobic / Wine</div><div class="hex">#722F4B</div></div>
      <div class="sw"><div class="chip" style="background:#3F6F73"></div><div class="name">Floral</div><div class="hex">#3F6F73</div></div>
      <div class="sw"><div class="chip" style="background:#5C6570"></div><div class="name">Neutral Fallback</div><div class="hex">#5C6570</div></div>
      <div class="sw"><div class="chip" style="background:#1A1A1A"></div><div class="name">Dark Card</div><div class="hex">#1A1A1A</div></div>
    </div>
  </div>
</body>
</html>
